<svg width="1200" height="400" viewBox="0 0 1200 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f0c29"/>
      <stop offset="50%" stop-color="#302b63"/>
      <stop offset="100%" stop-color="#24243e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f7971e"/>
      <stop offset="100%" stop-color="#ffd200"/>
    </linearGradient>
    <linearGradient id="badge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4facfe"/>
      <stop offset="100%" stop-color="#00f2fe"/>
    </linearGradient>
    <linearGradient id="badge2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#43e97b"/>
      <stop offset="100%" stop-color="#38f9d7"/>
    </linearGradient>
    <linearGradient id="badge3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fa709a"/>
      <stop offset="100%" stop-color="#fee140"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg)"/>

  <!-- Grid pattern -->
  <g opacity="0.07" stroke="#ffffff" stroke-width="0.5">
    <line x1="0" y1="50" x2="1200" y2="50"/>
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="150" x2="1200" y2="150"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="250" x2="1200" y2="250"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="350" x2="1200" y2="350"/>
    <line x1="100" y1="0" x2="100" y2="400"/>
    <line x1="200" y1="0" x2="200" y2="400"/>
    <line x1="300" y1="0" x2="300" y2="400"/>
    <line x1="400" y1="0" x2="400" y2="400"/>
    <line x1="500" y1="0" x2="500" y2="400"/>
    <line x1="600" y1="0" x2="600" y2="400"/>
    <line x1="700" y1="0" x2="700" y2="400"/>
    <line x1="800" y1="0" x2="800" y2="400"/>
    <line x1="900" y1="0" x2="900" y2="400"/>
    <line x1="1000" y1="0" x2="1000" y2="400"/>
    <line x1="1100" y1="0" x2="1100" y2="400"/>
  </g>

  <!-- Decorative circle glow left -->
  <circle cx="120" cy="200" r="180" fill="#4facfe" opacity="0.05"/>
  <!-- Decorative circle glow right -->
  <circle cx="1100" cy="180" r="200" fill="#fa709a" opacity="0.06"/>

  <!-- Left accent bar -->
  <rect x="80" y="130" width="5" height="140" rx="3" fill="url(#accent)" filter="url(#glow)"/>

  <!-- Main title -->
  <text x="110" y="210" font-family="'Segoe UI', 'Inter', 'Arial', sans-serif" font-size="80" font-weight="800" fill="#ffffff" filter="url(#shadow)">Learn Hero</text>

  <!-- Subtitle -->
  <text x="112" y="256" font-family="'Segoe UI', 'Inter', 'Arial', sans-serif" font-size="22" font-weight="400" fill="#a0aec0" letter-spacing="1">Web Development Deep Dive  —  100 Concepts</text>

  <!-- Accent underline -->
  <rect x="112" y="272" width="420" height="3" rx="2" fill="url(#accent)" opacity="0.8"/>

  <!-- Level badges -->
  <!-- Badge 1 -->
  <rect x="112" y="308" width="130" height="36" rx="18" fill="url(#badge)" opacity="0.9"/>
  <text x="177" y="331" font-family="'Segoe UI', 'Inter', 'Arial', sans-serif" font-size="13" font-weight="600" fill="#ffffff" text-anchor="middle">Level 1–3  Base</text>

  <!-- Badge 2 -->
  <rect x="256" y="308" width="148" height="36" rx="18" fill="url(#badge2)" opacity="0.9"/>
  <text x="330" y="331" font-family="'Segoe UI', 'Inter', 'Arial', sans-serif" font-size="13" font-weight="600" fill="#0f2027" text-anchor="middle">Level 4–6  Advanced</text>

  <!-- Badge 3 -->
  <rect x="418" y="308" width="155" height="36" rx="18" fill="url(#badge3)" opacity="0.9"/>
  <text x="495" y="331" font-family="'Segoe UI', 'Inter', 'Arial', sans-serif" font-size="13" font-weight="600" fill="#fff" text-anchor="middle">Level 7–10  Expert</text>

  <!-- Right side: code block decoration -->
  <rect x="820" y="80" width="320" height="240" rx="12" fill="#1a1a2e" opacity="0.8" filter="url(#shadow)"/>
  <!-- Code block header -->
  <rect x="820" y="80" width="320" height="36" rx="12" fill="#16213e"/>
  <rect x="820" y="104" width="320" height="12" fill="#16213e"/>
  <!-- Traffic lights -->
  <circle cx="848" cy="98" r="6" fill="#ff5f56"/>
  <circle cx="868" cy="98" r="6" fill="#ffbd2e"/>
  <circle cx="888" cy="98" r="6" fill="#27c93f"/>
  <!-- Code lines -->
  <rect x="844" y="134" width="180" height="8" rx="4" fill="#4facfe" opacity="0.7"/>
  <rect x="844" y="154" width="60" height="8" rx="4" fill="#fa709a" opacity="0.7"/>
  <rect x="916" y="154" width="120" height="8" rx="4" fill="#43e97b" opacity="0.7"/>
  <rect x="844" y="174" width="200" height="8" rx="4" fill="#ffd200" opacity="0.6"/>
  <rect x="860" y="194" width="100" height="8" rx="4" fill="#a0aec0" opacity="0.5"/>
  <rect x="860" y="214" width="140" height="8" rx="4" fill="#4facfe" opacity="0.5"/>
  <rect x="844" y="234" width="80" height="8" rx="4" fill="#fa709a" opacity="0.6"/>
  <rect x="936" y="234" width="100" height="8" rx="4" fill="#43e97b" opacity="0.5"/>
  <rect x="844" y="254" width="160" height="8" rx="4" fill="#a0aec0" opacity="0.4"/>
  <rect x="844" y="274" width="120" height="8" rx="4" fill="#ffd200" opacity="0.5"/>
  <rect x="844" y="294" width="200" height="8" rx="4" fill="#4facfe" opacity="0.3"/>
</svg>
